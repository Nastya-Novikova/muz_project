services:
  backend:
    build: ./backend
    ports:
      - "7000:7000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=musicianfinder;Username=postgres;Password=postgres
    depends_on:
      - postgres
    networks:
      - musician-net
      
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - musician-net
      
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: musicianfinder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - musician-net
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: minio/minio:latest
    container_name: musician-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - musician-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin123; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb myminio/musician-files --ignore-existing;
      mc anonymous set public myminio/musician-files;
      echo 'Bucket musician-files created and set to public';
      exit 0;
      "
    networks:
      - musician-net

networks:
  musician-net:
    driver: bridge

volumes:
  pgdata:
  minio-data: